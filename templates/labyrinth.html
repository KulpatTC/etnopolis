{% extends "base.html" %}

{% block content %}
<div id="banner-lab">
    <div id="banner-text-1">Культурный лабиринт</div>
    <div id="banner-text-2">Сайт по культуре Великой России</div>
</div>
<h2 id="h2cult">КУЛЬТУРНЫЙ ЛАБИРИНТ</h2>
<div id="leaderr"><a href="/leaderboard">
    <button>Таблица лидеров</button>
</a></div>
<h4 id="h2cult">Викторина</h4>
<div id="quiz">
    <h2 id="question">Вопрос</h2>
    <div id="answers"></div>
</div>
<div id="result" style="display:none;"></div>
<script id="questions">
    const questions = {{ voprosi | tojson | safe }};

    let currentQuestion = 0;
    let score = 0;

    const questionEl = document.getElementById("question");
    const answersEl = document.getElementById("answers");
    const nextBtn = document.getElementById("next");

    function showQuestion() {
        const q = questions[currentQuestion];
        questionEl.innerText = q.question;
        answersEl.innerHTML = "";

        q.answers.forEach((answer, index) => {
            const button = document.createElement("button");
            button.innerText = answer;
            button.onclick = () => checkAnswer(index);
            answersEl.appendChild(button);
        });
    }

    function checkAnswer(index) {
        if (index === questions[currentQuestion].correct) {
            score++;
        }
        currentQuestion++;
        if (currentQuestion < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function sendData() {
        var value = score;
        $.ajax({
            url: '/labyrinth',
            type: 'POST',
            data: {'data': value},
            success: function (response) {
                document.getElementById('output').innerHTML = response;
            },
            error: function (error) {
                console.log(error);
            }
        });
    }

    function showResult() {
        document.getElementById("quiz").style.display = "none";
        const resultEl = document.getElementById("result");
        resultEl.style.display = "block";
        resultEl.innerText = `Вы набрали ${score} из ${questions.length}`;
        sendData();
    }

    showQuestion(); // zapusk
</script>
<a href="/createtask"><button id="create">Создать Задание</button></a>
<div style="height: 0.4vh; background-color: #FFFFFF; width: 99.2vw; margin-top: 3.8vh;"></div>
<footer id="next">
    <a href="/">
        <button>На главную</button>
    </a>
</footer>
{% endblock %}
